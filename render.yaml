# Render Blueprint — Docker 웹 서비스 + 관리형 PostgreSQL
# https://render.com/docs/blueprint-spec

databases:
  - name: secret-scanner-db
    plan: free
    ipAllowList: []          # 외부 차단 — Render 내부 서비스에서만 연결

services:
  - type: web
    name: secret-scanner
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      # 위 Render Postgres의 연결 문자열을 자동 주입 (대시보드에서 직접 입력 불필요)
      - key: DATABASE_URL
        fromDatabase:
          name: secret-scanner-db
          property: connectionString
